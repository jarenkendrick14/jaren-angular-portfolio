<section class="page-projects" [class.active-page]="active">
  <div class="pin">
    <div class="pheader au d0">
      <h2 class="ph2">Selected Work</h2>
      <span class="pcnt">05 projects</span>
      <div class="phr" aria-hidden="true"></div>
    </div>
    
    <!-- Changed from <ul> to <div> to prevent ARIA child/parent conflicts -->
    <div class="plist">
      @for (proj of data.projects; track proj.num; let i = $index) {
        <!-- Changed from <li> to <div>. Classes remain identical to keep the same look/feel. -->
        <div class="pi al" 
            [class.d1]="i === 0" [class.d2]="i === 1" [class.d3]="i === 2" [class.d4]="i === 3" [class.d5]="i === 4"
            (click)="projectOpened.emit(i)" 
            (mouseenter)="previewHover.emit(i)" 
            (mouseleave)="previewHover.emit(null)"
            role="button" 
            tabindex="0" 
            (keydown.enter)="projectOpened.emit(i)">
          
          <span class="pnum">{{ proj.num }}</span>
          
          <div>
            <div class="pnm">{{ proj.name }}</div>
            <div class="psub">{{ proj.subtitle }}</div>
          </div>
          
          <div class="ptgs">
            @for (tag of proj.tags.slice(0, 3); track tag) {
              <span class="ptag">{{ tag }}</span>
            }
            @if (proj.tags.length > 3) {
              <span class="ptag ptag-more">+{{ proj.tags.length - 3 }}</span>
            }
          </div>
          
          <!-- aria-hidden added to the decorative arrow -->
          <span class="parr" aria-hidden="true">↗</span>
        </div>
      }
    </div>
  </div>
</section>
