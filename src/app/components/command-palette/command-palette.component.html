@if (isOpen()) {
  <div class="cp-backdrop" (click)="close()" aria-hidden="true"></div>
  <div class="cp-modal" role="dialog" aria-modal="true" aria-label="Command palette">
    <div class="cp-header">
      <span class="cp-search-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      <input
        #searchInput
        class="cp-input"
        type="text"
        placeholder="Type a command or search..."
        [value]="query()"
        (input)="onQueryChange($any($event.target).value)"
        autocomplete="off"
        spellcheck="false"
        aria-label="Search commands"
      />
      <kbd class="cp-esc-hint">ESC</kbd>
    </div>

    <div class="cp-list" role="listbox">
      @if (filteredItems().length === 0) {
        <div class="cp-empty">No results for "{{ query() }}"</div>
      } @else {
        @for (item of filteredItems(); track item.label; let i = $index) {
          <button
            class="cp-item"
            [class.selected]="selectedIndex() === i"
            role="option"
            [attr.aria-selected]="selectedIndex() === i"
            (click)="item.action()"
            (mouseenter)="selectedIndex.set(i)"
          >
            <span class="cp-item-icon" [innerHTML]="getIcon(item.icon)" aria-hidden="true"></span>
            <span class="cp-item-body">
              <span class="cp-item-label">{{ item.label }}</span>
              <span class="cp-item-desc">{{ item.description }}</span>
            </span>
            <span class="cp-item-enter" aria-hidden="true">↵</span>
          </button>
        }
      }
    </div>

    <div class="cp-footer">
      <span class="cp-hint"><kbd>↑↓</kbd> navigate</span>
      <span class="cp-hint"><kbd>↵</kbd> select</span>
      <span class="cp-hint"><kbd>Esc</kbd> close</span>
      <span class="cp-divider" aria-hidden="true"></span>
      <span class="cp-brand">Ctrl+K</span>
    </div>
  </div>
}
