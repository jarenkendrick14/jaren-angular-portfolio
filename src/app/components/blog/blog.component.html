<section class="page-blog" [class.active-page]="active">
  <div class="pin">
    <div class="pheader au d0">
      <h2 class="ph2">Blog.</h2>
      <span class="pcnt">{{ data.blogPosts.length }} posts</span>
      <!-- aria-hidden added to decorative line -->
      <div class="phr" aria-hidden="true"></div>
    </div>
    <div class="blog-grid">
      @for (post of data.blogPosts; track post.title; let i = $index) {
        <!--  Changed from <article> to <div> to avoid semantic conflict with role="button" -->
        <div class="bc as" [ngClass]="i === 0 ? 'd1' : 'd2'"
                 (click)="postOpened.emit(post)" 
                 role="button" 
                 tabindex="0"
                 (keydown.enter)="postOpened.emit(post)">
          <div class="bc-img">
            <img [src]="post.img" [alt]="post.title" 
                 style="width:100%; height:100%; object-fit:cover;"
                 onerror="this.style.opacity='0.1'"> 
          </div>
          <div class="bc-body">
            <div class="bc-meta">
              <p class="bc-date">{{ post.date }}</p>
              @if (post.readingTime) {
                <span class="bc-reading-time">{{ post.readingTime }}</span>
              }
              @if (post.category) {
                <span class="bc-category">{{ post.category }}</span>
              }
            </div>
            <h3 class="bc-title">{{ post.title }}</h3>
            <p class="bc-excerpt">{{ post.excerpt }}</p>
            <span class="bc-read">Read Post <span aria-hidden="true">→</span></span>
          </div>
        </div>
      }
    </div>
  </div>
</section>
